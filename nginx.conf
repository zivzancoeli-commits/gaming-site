# /etc/nginx/sites-available/gaming-site
# Replace YOUR_DOMAIN with your actual domain (e.g. algebra.mathpracticelab.com)

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL (Let's Encrypt via Certbot fills these in automatically)
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers that help with filter evasion
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy no-referrer;
    # Remove the server header to hide nginx version
    server_tokens off;

    # Gzip compression (reduces bandwidth on 1 OCPU)
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_comp_level 5;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2|woff)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Proxy everything to Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket support (required for Ultraviolet bare server)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffering off;

        # Needed for large game assets
        client_max_body_size 50M;
    }
}

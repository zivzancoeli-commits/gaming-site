<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Hub – Music</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b0c1a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #10122a; border-bottom: 1px solid #1e2244; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    header a { color: #7c3aed; font-weight: 600; text-decoration: none; font-size: 14px; }
    header h1 { font-size: 16px; color: #e2e8f0; }
    .banner-ad { background: #10122a; border-bottom: 1px solid #1e2244; padding: 4px 20px; min-height: 50px; display: flex; align-items: center; justify-content: center; }
    main { flex: 1; padding: 24px 20px; max-width: 900px; margin: 0 auto; width: 100%; }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: #e2e8f0; }
    .stations { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .station-card { background: #181a32; border: 1px solid #1e2244; border-radius: 12px; overflow: hidden; cursor: pointer; transition: border-color 0.18s, transform 0.18s; }
    .station-card:hover { border-color: #7c3aed; transform: translateY(-2px); }
    .station-card .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; background: #1f2240; }
    .station-card .info { padding: 10px 12px; }
    .station-card .info .name { font-size: 13px; font-weight: 500; }
    .station-card .info .sub { font-size: 11.5px; color: #94a3b8; margin-top: 2px; }
    .player-container { background: #181a32; border: 1px solid #1e2244; border-radius: 12px; overflow: hidden; }
    .player-container iframe { width: 100%; height: 400px; border: none; display: block; }
  </style>
</head>
<body>
  <header>
    <a href="/">← Back</a>
    <h1>Music</h1>
  </header>
  <div class="banner-ad">
    <ins class="adsbygoogle" style="display:inline-block;width:728px;height:90px;max-width:100%" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="XXXXXXXXXX"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>
  <main>
    <h2>Lofi & Study Playlists</h2>
    <div class="stations" id="stations"></div>
    <h2>Now Playing</h2>
    <div class="player-container">
      <iframe id="yt-player" src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </main>
  <script>
    const STATIONS = [
      { name: 'Lofi Hip Hop', sub: 'Chill Beats', ytId: 'jfKfPfyJRdk', thumb: 'https://img.youtube.com/vi/jfKfPfyJRdk/mqdefault.jpg' },
      { name: 'Study Music', sub: 'Focus Flow', ytId: '5qap5aO4i9A', thumb: 'https://img.youtube.com/vi/5qap5aO4i9A/mqdefault.jpg' },
      { name: 'Jazz Vibes', sub: 'Relaxing Jazz', ytId: 'neV3EPgvZ3g', thumb: 'https://img.youtube.com/vi/neV3EPgvZ3g/mqdefault.jpg' },
      { name: 'Gaming OST', sub: 'Epic Soundtracks', ytId: 'sP_DcBbhMz4', thumb: 'https://img.youtube.com/vi/sP_DcBbhMz4/mqdefault.jpg' },
    ];
    const grid = document.getElementById('stations');
    const player = document.getElementById('yt-player');
    STATIONS.forEach(s => {
      const card = document.createElement('div');
      card.className = 'station-card';
      card.innerHTML = `<img class="thumb" src="${s.thumb}" alt="${s.name}" loading="lazy"><div class="info"><div class="name">${s.name}</div><div class="sub">${s.sub}</div></div>`;
      card.addEventListener('click', () => { player.src = `https://www.youtube.com/embed/${s.ytId}?autoplay=1`; });
      grid.appendChild(card);
    });
  </script>
</body>
</html>

  <!-- UV proxy scripts (needed for game iframe encoding) -->
  <script src="/baremux/index.js"></script>
  <script src="/uv/uv.bundle.js"></script>
  <script src="/uv/uv.config.js"></script>
  <script>
    // Register UV service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/uv/sw.js', { scope: '/service/' })
        .catch(() => {});
    }
    // Init bare-mux transport
    async function initGameTransport() {
      try {
        if (typeof BareMux === 'undefined') return;
        const conn = new BareMux.BareMuxConnection('/baremux/worker.js');
        const cur = await conn.getTransport().catch(() => null);
        if (cur !== '/epoxy/index.mjs') {
          await conn.setTransport('/epoxy/index.mjs', [{ wisp: `wss://${location.host}/wisp/` }]);
        }
      } catch(e) {}
    }
    initGameTransport();
  </script>

  <script src="/js/games-data.js"></script>
  <script src="/js/app.js"></script>
  <script>
    // Colour-cycling splash title
    (function () {
      const title = document.getElementById('splash-title');
      const home  = document.getElementById('page-home');
      if (!title || !home) return;

      let hue = 0;
      (function cycle() {
        hue = (hue + 0.4) % 360;
        title.style.color = `hsl(${hue}, 100%, 70%)`;
        requestAnimationFrame(cycle);
      })();

    })();
  </script>

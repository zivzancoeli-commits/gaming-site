  <script>
    // Register UV service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/uv/sw.js', { scope: '/service/' })
        .catch(() => {});
    }
    // Init bare-mux transport
    async function initGameTransport() {
      try {
        if (typeof BareMux === 'undefined') return;
        const conn = new BareMux.BareMuxConnection('/baremux/worker.js');
        const cur = await conn.getTransport().catch(() => null);
        if (cur !== '/epoxy/index.mjs') {
          await conn.setTransport('/epoxy/index.mjs', [{ wisp: `wss://${location.host}/wisp/` }]);
        }
      } catch(e) {}
    }
    initGameTransport();
  </script>

  <script>
  (function () {
    /* ── Interactive particle background ── */
    const canvas = document.getElementById('hero-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    let W, H, mouse = { x: -9999, y: -9999 };
    const PARTICLE_COUNT = 120;
    const CONNECT_DIST   = 130;
    const MOUSE_REPEL    = 110;
    let particles = [];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }

    function mkParticle() {
      return {
        x:  Math.random() * W,
        y:  Math.random() * H,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        r:  Math.random() * 1.8 + 0.6,
        hue: Math.random() * 60 + 240,  // blue-purple range
      };
    }

    function init() {
      resize();
      particles = Array.from({ length: PARTICLE_COUNT }, mkParticle);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Update + draw particles
      particles.forEach(p => {
        // Mouse repel
        const dx = p.x - mouse.x;
        const dy = p.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < MOUSE_REPEL && dist > 0) {
          const force = (MOUSE_REPEL - dist) / MOUSE_REPEL * 0.6;
          p.vx += (dx / dist) * force;
          p.vy += (dy / dist) * force;
        }

        // Dampen & move
        p.vx *= 0.97;
        p.vy *= 0.97;
        p.x  += p.vx;
        p.y  += p.vy;

        // Wrap edges
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;

        // Draw dot
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${p.hue},80%,75%,0.85)`;
        ctx.fill();
      });

      // Draw connecting lines
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i], b = particles[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < CONNECT_DIST * CONNECT_DIST) {
            const alpha = 1 - Math.sqrt(d2) / CONNECT_DIST;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(160,130,255,${alpha * 0.35})`;
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }

    init();
    draw();

    // Mouse tracking (relative to canvas)
    document.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = e.clientX - rect.left;
      mouse.y = e.clientY - rect.top;
    });
    document.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });
    window.addEventListener('resize', init);

    /* ── Colour-cycling title ── */
    const title = document.getElementById('hero-title');
    let hue = 0;
    function cycleTitle() {
      if (title) {
        hue = (hue + 0.6) % 360;
        title.style.backgroundImage =
          `linear-gradient(135deg,
             hsl(${hue},90%,70%) 0%,
             hsl(${(hue+60)%360},85%,65%) 40%,
             hsl(${(hue+120)%360},90%,70%) 100%)`;
      }
      requestAnimationFrame(cycleTitle);
    }
    cycleTitle();

    /* ── Game count ── */
    function setHeroCount() {
      const el = document.getElementById('hero-game-count');
      if (el && typeof GAMES !== 'undefined') el.textContent = GAMES.length + '+';
    }
    if (typeof GAMES !== 'undefined') setHeroCount();
    else window.addEventListener('load', setHeroCount);
  })();
  </script>
